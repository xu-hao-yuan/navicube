<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1628"/>
      <stop offset="100%" style="stop-color:#1a2744"/>
    </linearGradient>
    <linearGradient id="cube-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4fc3f7"/>
      <stop offset="100%" style="stop-color:#0288d1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g stroke="#ffffff" stroke-width="0.5" opacity="0.05">
    <line x1="0" y1="0" x2="0" y2="400"/>
    <line x1="60" y1="0" x2="60" y2="400"/>
    <line x1="120" y1="0" x2="120" y2="400"/>
    <line x1="180" y1="0" x2="180" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="360" y1="0" x2="360" y2="400"/>
    <line x1="420" y1="0" x2="420" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/>
    <line x1="540" y1="0" x2="540" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="660" y1="0" x2="660" y2="400"/>
    <line x1="720" y1="0" x2="720" y2="400"/>
    <line x1="780" y1="0" x2="780" y2="400"/>
    <line x1="840" y1="0" x2="840" y2="400"/>
    <line x1="900" y1="0" x2="900" y2="400"/>
    <line x1="960" y1="0" x2="960" y2="400"/>
    <line x1="1020" y1="0" x2="1020" y2="400"/>
    <line x1="1080" y1="0" x2="1080" y2="400"/>
    <line x1="1140" y1="0" x2="1140" y2="400"/>
    <line x1="1200" y1="0" x2="1200" y2="400"/>
    <line x1="0" y1="40" x2="1200" y2="40"/>
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="280" x2="1200" y2="280"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
  </g>

  <!-- Left side: Text -->
  <text x="80" y="155" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="72" font-weight="700" fill="#ffffff" filter="url(#glow)">🧊 NaviCube</text>
  <text x="80" y="210" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="24" fill="#94a3b8">Your Personal Navigation Hub</text>
  <text x="80" y="250" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" fill="#64748b">Single file · Zero dependencies · Ready to run</text>

  <!-- Badges -->
  <rect x="80" y="280" width="100" height="28" rx="14" fill="#1e3a5f"/>
  <text x="130" y="300" font-family="monospace" font-size="13" fill="#4fc3f7" text-anchor="middle">MIT License</text>

  <rect x="195" y="280" width="120" height="28" rx="14" fill="#1e3a5f"/>
  <text x="255" y="300" font-family="monospace" font-size="13" fill="#4fc3f7" text-anchor="middle">v1.0 Release</text>

  <!-- Right side: Cube icon -->
  <g transform="translate(880, 80)">
    <!-- 3D cube effect -->
    <polygon points="120,30 220,80 220,200 120,250 20,200 20,80" fill="url(#cube-grad)" opacity="0.9"/>
    <polygon points="120,30 220,80 120,130 20,80" fill="#81d4fa" opacity="0.9"/>
    <polygon points="20,80 120,130 120,250 20,200" fill="#0288d1" opacity="0.7"/>
    <polygon points="220,80 120,130 120,250 220,200" fill="#01579b" opacity="0.8"/>
    <!-- Cube label -->
    <text x="120" y="145" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="700" fill="#ffffff" text-anchor="middle">NAV</text>
  </g>

  <!-- Floating site icons -->
  <g opacity="0.6">
    <rect x="750" y="100" width="36" height="36" rx="8" fill="#ffffff"/>
    <text x="768" y="124" font-size="18" text-anchor="middle">🔗</text>

    <rect x="1000" y="160" width="32" height="32" rx="6" fill="#ffffff"/>
    <text x="1016" y="181" font-size="16" text-anchor="middle">⚙️</text>

    <rect x="770" y="260" width="30" height="30" rx="6" fill="#ffffff"/>
    <text x="785" y="281" font-size="15" text-anchor="middle">📁</text>

    <rect x="1020" y="260" width="34" height="34" rx="7" fill="#ffffff"/>
    <text x="1037" y="285" font-size="17" text-anchor="middle">🚀</text>
  </g>
</svg>
